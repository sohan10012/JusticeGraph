# ── Managed databases ───────────────────────────────────────────────────────
databases:
  - name: nyaymarg-db
    region: singapore
    plan: free
    databaseName: nyaymarg
    user: nyaymarg

  - name: nyaymarg-redis
    region: singapore
    plan: free
