services:
  # ── Main API ────────────────────────────────────────────────────────────────
  - type: web
    name: nyaymarg-api
    runtime: python
    region: singapore
    plan: free
    rootDir: nyaymarg-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: nyaymarg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REDIS_URL
        fromService:
          name: nyaymarg-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: nyaymarg-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: nyaymarg-redis
          type: redis
          property: connectionString
      - key: MODEL_ARTEFACTS_DIR
        value: "/tmp/artefacts"
      - key: UPLOAD_DIR
        value: "/tmp/uploads"
      - key: SKIP_MODEL_TRAINING
        value: "True"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
      - key: ECIAPI_ENABLED
        value: "True"
      - key: IK_ENABLED
        value: "False"
      - key: KANOON_DEV_ENABLED
        value: "False"
      - key: ECOURTSINDIA_ENABLED
        value: "False"
      - key: DATA_GOV_ENABLED
        value: "False"
      - key: DDL_ENABLED
        value: "False"
      - key: COURTLISTENER_ENABLED
        value: "False"
    healthCheckPath: /health

